evidence:
  - source: zelkim/langgraph-insurance-chatbot
    type: reference-implementation
    key_findings:
      - LangGraph StateGraph with 9 nodes and 6 conditional edges
      - Two-phase dynamic schema prevents field-name bias in slot filling
      - "Once transactional, always transactional" sticky mode lock
      - Frontmatter protocol for deterministic structured UI rendering
      - Pure pass-through router node (routing logic in conditional edges)
      - RAG/question-answering logic duplicated across conversational and transactional branches
    relevant_specs:
      - docs/superpowers/specs/2026-06-16-extraction-layer-design.md
      - docs/superpowers/specs/2026-06-16-routing-execution-layer-design.md
      - docs/superpowers/specs/2026-06-16-response-generation-layer-design.md

  - source: Prodigal-Payment-Collection-Agent
    type: reference-implementation
    key_findings:
      - 7-state FSM with strict one-way transitions (Python enum + if/elif dispatch)
      - LLM used ONLY for entity extraction; all routing deterministic
      - Mandatory regex/DOM-parser fallbacks for every slot — passes all 9 tests without LLM
      - State-aware NLU prompting to prevent cross-slot confusion
      - Card data wiped from memory immediately after API call (PCI-DSS awareness)
      - PII zero-leakage verified by automated test harness
      - Per-phase independent retry budgets
      - Expiry parsed before CVV to prevent digit collision
    relevant_specs:
      - docs/superpowers/specs/2026-06-16-extraction-layer-design.md
      - docs/superpowers/specs/2026-06-16-routing-execution-layer-design.md
      - docs/superpowers/specs/2026-06-16-response-generation-layer-design.md

  - source: chatbot-FSM-experiment
    type: supplementary
    key_findings:
      - Healthcare scheduler with FastAPI + Next.js + PostgreSQL
      - FSM-based conversational agent
      - Docker Compose orchestration for full-stack demo
    relevant_specs: []

