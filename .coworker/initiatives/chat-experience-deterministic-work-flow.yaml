decisions:
  - date: '2026-06-15'
    what: Tech stack — Python + LangGraph
    why: LangGraph provides state graph, checkpoint, streaming primitives; Python has strongest LangGraph ecosystem
    who: cicidi
  - date: '2026-06-15'
    what: Scope — generic framework (not single-industry specific)
    why: Framework should be configurable for any regulated industry; industry-specific flows as plugins/configs
    who: cicidi
  - date: '2026-06-15'
    what: LLM strategy — LLM-assisted NLU with deterministic core workflows
    why: LLM excels at understanding; execution must be auditable and deterministic
    who: cicidi
  - date: '2026-06-15'
    what: Deliverable — pure Python framework library (pip installable)
    why: Framework only, no frontend; other projects consume as dependency
    who: cicidi
  - date: '2026-06-16'
    what: Control granularity — per-node LLM/deterministic switch (not per-layer binary)
    why: Real projects (zelkim, Prodigal) show LLM usage varies by node, not by layer; some nodes need LLM, others must be deterministic
    who: cicidi
  - date: '2026-06-16'
    what: Sub-workflow reuse — shared capabilities defined once, triggered from any entry point
    why: zelkim duplicates RAG/question-answering logic in two branches; framework should prevent this
    who: cicidi
  - date: '2026-06-16'
    what: Output format — spec-first with Python reference implementation
    why: Spec defines language-agnostic interfaces; Python impl proves feasibility; enables future TS/Go ports
    who: cicidi

