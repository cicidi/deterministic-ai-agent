name: chat-experience-deterministic-work-flow
status: active
description: >
  Design and build a deterministic workflow framework for enterprise chatbots
  in regulated industries (finance, health, insurance). The framework follows
  a three-layer architecture (NLU/Extraction → Routing/Execution → Response
  Generation) where each node independently chooses LLM-driven or deterministic
  execution. All docs and code comments in English; team discussion in Chinese.

goal: >
  Produce a comprehensive specification document for the deterministic workflow
  framework. The spec consists of a high-level overview document and layered
  sub-documents for each architectural layer, with parent-child cross-references,
  per-file changelogs, and evidence sections backed by analysis of real-world
  reference projects.

